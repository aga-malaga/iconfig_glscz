<!DOCTYPE html>
<html lang="">
  <head>
    <title>Integracja GLS CZ</title>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="header" id="header">
      <div class="headerlogo">
        <span id="logostatus">Integracja GLS CZ od iConfig.pl</span>
      </div>
    </div>

    <div class="menuarea">
      <div id="menu-container">
        <button class="menu-btn" id="api-page-btn">
          Połączenie z API Apilo
        </button>
        <button class="menu-btn" id="contactId-page-btn">
          Nadawcy GLS CZ
        </button>

        <div class="horizontal-row">
          Backend GLS CZ
          <input
            type="text"
            id="backendBaseUrl"
            placeholder="http://localhost:8080"
          />
        </div>

        <div class="horizontal-row">
          X-API-KEY
          <input type="text" id="backendApiKey" placeholder="X-API-KEY" />
        </div>

        <div class="horizontal-row">
          User UUID
          <input type="text" id="userUuid" placeholder="UUID użytkownika" />
        </div>

        <div class="horizontal-row">
          ID drukarki printNode do wydruku etykiet
          <input
            type="text"
            id="printNodePrinterId"
            placeholder="ID drukarki"
          />
        </div>

        <div class="horizontal-row">
          Komentarz na etykiecie:
          <select id="labelCommentOption">
            <option value="orderNumber">Numer zamówienia</option>
            <option value="skuOnly">SKU produktów</option>
            <option value="quantityAndSku">Ilość + SKU produktów</option>
          </select>
        </div>

        <div class="subpage" id="licence-page">
          <div>
            <button type="button" class="back-btn" id="licence-back-btn">
              ← Powrót
            </button>
          </div>
        </div>

        <div class="subpage" id="api-page">
          <div>
            <button class="back-btn" type="button" id="api-page-back-btn">
              ← Powrót
            </button>
          </div>

          <h2>połączenie api</h2>
          <div id="apiDataContainer">
            <label for="aliasInput"></label
            ><input
              class="large-input"
              type="text"
              id="aliasInput"
              placeholder=".apilo.com"
            />
            <label for="idInput"></label
            ><input
              class="large-input"
              type="text"
              id="idInput"
              placeholder="Client ID"
            />
            <label for="secretInput"></label
            ><input
              class="large-input"
              type="text"
              id="secretInput"
              placeholder="Client Secret"
            />
            <label for="codeInput"></label
            ><input
              class="large-input"
              type="text"
              id="codeInput"
              placeholder="Kod autoryzacji"
            />
          </div>
          <button type="button" id="apiBtn" class="default-btn">Połącz</button>
          <div id="apiErrorMessage"></div>
          <div id="manual">
            Sprawdź
            <a
              id="apihelp"
              href="https://iconfig.pl/instrukcje/zakladki_do_apilo_manual.pdf"
              target="_blank"
            >
              jak wygenerować klucze API</a
            >
          </div>
        </div>

        <div id="list-page" class="subpage">
          <div>
            <button class="back-btn" type="button" id="list-page-back-btn">
              ← Powrót
            </button>
            <div class="menuarea">
              <h2>Nadawcy GLS CZ</h2>
              <div id="listDataContainer"></div>

              <button type="button" id="listBtn" class="default-btn">
                Dodaj nadawcę
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
